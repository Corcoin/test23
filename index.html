<!DOCTYPE html>
<html>
<head>
<title>TeachAI Worker Portal</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

/* TOP BAR */

.topbar {
  background: #1a1a1a;
  padding: 15px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
}

.topbar button {
  padding: 10px 15px;
  background: #4CAF50;
  border: none;
  color: white;
  cursor: pointer;
}

#wallet {
  margin-left: 20px;
}

/* LAYOUT */

.container {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */

.sidebar {
  width: 240px;
  background: #181818;
  padding: 20px;
  border-right: 1px solid #333;
}

.menu-item {
  padding: 10px;
  background: #222;
  margin-bottom: 10px;
  border-radius: 6px;
}

/* MAIN */

.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* TASK AREA */

.task-area {
  background: #222;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* OPTIONS */

.option {
  display: block;
  margin: 8px 0;
}

/* FACTORY */

.factory-box {
  background: #1f1f1f;
  padding: 20px;
  border-radius: 8px;
}

.job-card {
  background: #222;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 6px;
}

input {
  padding: 10px;
  width: 300px;
  margin-top: 10px;
}

</style>

</head>

<body>

<div class="topbar">

<button onclick="connectWallet()">
Enter With MetaMask
</button>

<span id="wallet"></span>

</div>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Worker Panel</h3>

<div class="menu-item">
AI Micro Work
</div>

<div class="menu-item">
Factory Jobs
</div>

<h3>Your Balance</h3>

<p id="balance">
TRB Balance: 0
</p>

</div>

<!-- MAIN -->

<div class="main" id="dashboard" style="display:none;">

<h2>AI Micro Work Task</h2>

<div class="task-area">

<p id="taskQuestion">
Loading task...
</p>

<div id="taskOptions"></div>

<br>

<button onclick="submitTask()">
Submit Work
</button>

</div>

<!-- FACTORY JOBS -->

<div class="factory-box">

<h2>Factory Job Board</h2>

<div class="job-card">

<strong>Packaging Workers</strong>

<p>
Slots Remaining: 
<span id="slots1">100</span>
</p>

<button onclick="claimJob(1)">
Claim Slot
</button>

</div>

<div class="job-card">

<strong>Assembly Workers</strong>

<p>
Slots Remaining: 
<span id="slots2">50</span>
</p>

<button onclick="claimJob(2)">
Claim Slot
</button>

</div>

<h3>Enter Shipping Address</h3>

<input
type="text"
id="addressBox"
placeholder="Enter Shipping Address"
/>

<br>

<button onclick="saveAddress()">
Submit Address
</button>

</div>

</div>

</div>

<script>

/* WALLET */

let balance = 0;

async function connectWallet() {

if (typeof window.ethereum !== 'undefined') {

const accounts =
await ethereum.request({
method: 'eth_requestAccounts'
});

document.getElementById("wallet").innerText =
"Connected: " + accounts[0];

document.getElementById("dashboard").style.display = "block";

loadTask();

} else {

alert("MetaMask not detected.");

}

}

/* TASK SYSTEM */

let currentTask = null;

let tasks = [

{
question:
"If A > B and B > C, which is greatest?",
options:
["A","B","C"],
correct:
"A",
reward:
5
},

{
question:
"What is 2 + 2?",
options:
["3","4","5"],
correct:
"4",
reward:
3
},

{
question:
"Which is a fruit?",
options:
["Car","Apple","Rock"],
correct:
"Apple",
reward:
4
},

{
question:
"What color is the sky?",
options:
["Blue","Green","Orange"],
correct:
"Blue",
reward:
2
}

];

function loadTask() {

currentTask =
tasks[Math.floor(Math.random() * tasks.length)];

document.getElementById("taskQuestion")
.innerText =
currentTask.question;

let optionsHTML = "";

for (let i = 0; i < currentTask.options.length; i++) {

optionsHTML +=
'<label class="option">' +
'<input type="radio" name="taskOption" value="' +
currentTask.options[i] +
'"> ' +
currentTask.options[i] +
'</label>';

}

document.getElementById("taskOptions")
.innerHTML = optionsHTML;

}

/* SUBMIT TASK */

function submitTask() {

let answers =
document.getElementsByName("taskOption");

let selected = "";

for (let i = 0; i < answers.length; i++) {

if (answers[i].checked) {

selected = answers[i].value;

}

}

if (selected == "") {

alert("Select an answer");

return;

}

if (selected == currentTask.correct) {

balance += currentTask.reward;

document.getElementById("balance")
.innerText =
"TRB Balance: " +
balance.toFixed(2);

alert(
"Correct — Earned " +
currentTask.reward +
" TRB"
);

loadTask();

} else {

alert("Incorrect — try next task");

loadTask();

}

}

/* FACTORY */

let slots1 = 100;
let slots2 = 50;

function claimJob(job) {

if (job == 1 && slots1 > 0) {

slots1--;

document.getElementById("slots1")
.innerText = slots1;

alert("Packaging Job Reserved");

}

if (job == 2 && slots2 > 0) {

slots2--;

document.getElementById("slots2")
.innerText = slots2;

alert("Assembly Job Reserved");

}

}

/* ADDRESS */

function saveAddress() {

let addr =
document.getElementById("addressBox").value;

if (addr.length > 5) {

alert("Address Submitted");

} else {

alert("Enter valid address");

}

}

</script>

</body>
</html>
