<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TeachAI Worker Portal</title>

<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>

body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
margin:0;
overflow:hidden;
}

.topbar{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#f6851b,#e2761b);
color:white;
font-weight:bold;
cursor:pointer;
}

.container{
display:none;
height:calc(100vh - 60px);
}

.sidebar{
width:280px;
background:#111;
padding:20px;
}

.main{
flex:1;
padding:25px;
overflow:auto;
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid #f6851b;
padding:20px;
border-radius:15px;
}

textarea{
width:100%;
padding:10px;
border-radius:10px;
background:#000;
color:white;
border:1px solid #f6851b;
}

#landing{
height:calc(100vh - 60px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#messageBox{
position:fixed;
bottom:20px;
right:20px;
background:#28a745;
padding:15px;
border-radius:10px;
display:none;
}

.data-item{
background:#000;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:13px;
}

.block-item{
background:#050505;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:12px;
border-left:3px solid #f6851b;
}

</style>
</head>

<body>

<div class="topbar">

<button id="connectBtn" onclick="connectWallet()">
Connect MetaMask
</button>

<button id="logoutBtn"
onclick="logout()"
style="display:none;">
Logout
</button>

<span id="wallet"></span>

</div>

<div id="landing">

<h1>TeachAI Worker Portal</h1>

<p>
Work Tasks → Earn TIB → Grow Value 🚀
</p>

<button onclick="connectWallet()">
Connect Wallet
</button>

</div>

<div class="container" id="dashboard">

<div class="sidebar">

<h3>Wallet Info</h3>

<p id="fullWallet"></p>

<p id="balance">
TIB Balance: 0
</p>

<p>
Tasks Completed:
<span id="taskCount">0</span>
</p>

</div>

<div class="main">

<div class="card">

<label>Ask AI Question</label>

<textarea id="questionInput"></textarea>

<button onclick="generateAI()">
Generate AI
</button>

<label>AI Answer</label>

<textarea id="aiAnswer"></textarea>

<label>Correct Answer</label>

<textarea id="correctedAnswer"></textarea>

<button onclick="submitWork()">
Submit Work & Mint 0.1 TIB
</button>

</div>

<div class="card">

<h3>Your Submitted Data</h3>

<div id="dataList"></div>

</div>

<div class="card">

<h3>Live Blockchain Data Stream</h3>

<div id="blockStream"></div>

</div>

</div>

</div>

<div id="messageBox"></div>

<script>

/* CONFIG */

const TIB_ADDRESS="0xYourTIBContractAddress";

const TIB_ABI=[
"function mint(address to,uint256 amount) public",
"function balanceOf(address owner) view returns (uint256)"
];

let provider;
let signer;
let tibContract;

let tasksCompleted=0;

/* BLOCKCHAIN SYSTEM */

let blockchain=[];

function createHash(data){
return btoa(JSON.stringify(data)).slice(0,32);
}

function createBlock(question,corrected){

const prevHash=
blockchain.length>0
? blockchain[blockchain.length-1].hash
: "GENESIS";

const block={
index:blockchain.length+1,
timestamp:new Date().toLocaleTimeString(),
question,
corrected,
previousHash:prevHash
};

block.hash=createHash(block);

blockchain.push(block);

localStorage.setItem(
"teachai_chain",
JSON.stringify(blockchain)
);

displayBlockchain();

}

function loadBlockchain(){

let saved=
JSON.parse(localStorage.getItem("teachai_chain"));

if(saved){

blockchain=saved;

displayBlockchain();

}

}

function displayBlockchain(){

const container=
document.getElementById("blockStream");

container.innerHTML="";

let lastBlocks=
blockchain.slice(-5).reverse();

lastBlocks.forEach(block=>{

const div=
document.createElement("div");

div.className="block-item";

div.innerHTML=

"<b>Block #"+block.index+"</b><br>"+
"Time: "+block.timestamp+"<br>"+
"Hash: "+block.hash+"<br>"+
"Prev: "+block.previousHash;

container.appendChild(div);

});

}

/* MESSAGE */

function showMessage(text){

const box=document.getElementById("messageBox");

box.innerText=text;

box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},4000);

}

/* CONNECT */

async function connectWallet(){

if(!window.ethereum){
alert("Install MetaMask");
return;
}

provider=
new ethers.providers.Web3Provider(window.ethereum);

await provider.send("eth_requestAccounts",[]);

signer=provider.getSigner();

tibContract=
new ethers.Contract(
TIB_ADDRESS,
TIB_ABI,
signer
);

const addr=
await signer.getAddress();

document.getElementById("wallet").innerText=
addr.slice(0,6)+"..."+addr.slice(-4);

document.getElementById("fullWallet").innerText=
"Full Wallet: "+addr;

loadBalance();

document.getElementById("landing").style.display="none";
document.getElementById("dashboard").style.display="flex";

document.getElementById("connectBtn").style.display="none";
document.getElementById("logoutBtn").style.display="inline-block";

}

/* LOAD BALANCE */

async function loadBalance(){

const addr=await signer.getAddress();

const bal=
await tibContract.balanceOf(addr);

const formatted=
ethers.utils.formatUnits(bal,18);

document.getElementById("balance").innerText=
"TIB Balance: "+
parseFloat(formatted).toFixed(2);

}

/* LOGOUT */

function logout(){

signer=null;
provider=null;
tibContract=null;

document.getElementById("dashboard").style.display="none";
document.getElementById("landing").style.display="flex";

document.getElementById("connectBtn").style.display="inline-block";
document.getElementById("logoutBtn").style.display="none";

}

/* AI */

function generateAI(){

const responses=[
"Pattern detected",
"Estimated output",
"Generated logic",
"Context result",
"Training-based answer"
];

document.getElementById("aiAnswer").value=
responses[Math.floor(Math.random()*responses.length)];

}

/* SAVE DATA */

function saveData(question,corrected){

const data={
question,
corrected,
date:new Date().toLocaleString()
};

let list=
JSON.parse(localStorage.getItem("workerData"))||[];

list.push(data);

localStorage.setItem(
"workerData",
JSON.stringify(list)
);

displayData();

}

/* DISPLAY DATA */

function displayData(){

let list=
JSON.parse(localStorage.getItem("workerData"))||[];

const container=
document.getElementById("dataList");

container.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");

div.className="data-item";

div.innerHTML=

"<b>Q:</b> "+item.question+
"<br><b>A:</b> "+item.corrected+
"<br><small>"+item.date+"</small>";

container.appendChild(div);

});

}

/* SUBMIT WORK */

async function submitWork(){

if(!signer){
alert("Connect wallet first");
return;
}

const q=document.getElementById("questionInput").value.trim();
const a=document.getElementById("aiAnswer").value.trim();
const c=document.getElementById("correctedAnswer").value.trim();

if(!q||!a||!c){
alert("Complete fields");
return;
}

try{

const amount=
ethers.utils.parseUnits("0.1",18);

const tx=
await tibContract.mint(
await signer.getAddress(),
amount
);

await tx.wait();

showMessage("✅ 0.1 TIB Minted");

}
catch(err){

alert("Mint Failed: "+err.message);
return;

}

/* CREATE BLOCK */

createBlock(q,c);

/* SAVE DATA */

saveData(q,c);

tasksCompleted++;

document.getElementById("taskCount").innerText=
tasksCompleted;

loadBalance();

document.getElementById("questionInput").value="";
document.getElementById("aiAnswer").value="";
document.getElementById("correctedAnswer").value="";

}

/* INIT */

displayData();
loadBlockchain();

</script>

</body>
</html>
