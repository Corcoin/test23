<!DOCTYPE html>
<html>
<head>
<title>TeachAI Worker Portal</title>

<!-- SAFE ETHERS LOAD -->
<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
/* =======================
   GLOBAL STYLES
======================= */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  margin: 0;
  overflow: hidden;
}

/* =======================
   TOP BAR
======================= */
.topbar {
  background: rgba(0, 0, 0, 0.85);
  padding: 15px 30px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #444;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.topbar button {
  padding: 10px 20px;
  background: linear-gradient(90deg, #0affd7, #00d4ff);
  border: none;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  border-radius: 12px;
  box-shadow: 0 0 10px #00d4ff, 0 0 20px #0affd7 inset;
  transition: all 0.3s ease;
}

.topbar button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00d4ff, 0 0 40px #0affd7 inset;
}

#wallet {
  margin-left: 30px;
  font-weight: bold;
  color: #0affd7;
  text-shadow: 0 0 5px #0affd7;
}

/* =======================
   LAYOUT
======================= */
.container {
  display: flex;
  height: calc(100vh - 60px);
  overflow: hidden;
}

/* =======================
   SIDEBAR
======================= */
.sidebar {
  width: 260px;
  background: rgba(20,20,20,0.95);
  padding: 20px;
  border-right: 1px solid #333;
  backdrop-filter: blur(8px);
  box-shadow: inset -3px 0 10px rgba(0,255,255,0.2);
}

.sidebar h3 {
  margin-top: 0;
  text-transform: uppercase;
  color: #00d4ff;
  letter-spacing: 1px;
}

.menu-item {
  padding: 12px;
  background: rgba(255,255,255,0.05);
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  border-left: 4px solid transparent;
}

.menu-item:hover {
  background: rgba(0, 255, 223, 0.15);
  border-left: 4px solid #0affd7;
}

/* =======================
   MAIN CONTENT
======================= */
.main {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  border-radius: 0 15px 15px 0;
  box-shadow: inset 0 0 50px rgba(0,255,223,0.1);
}

/* =======================
   TASK BOXES
======================= */
.task-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid #0affd7;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 25px;
  box-shadow: 0 0 15px rgba(0,255,223,0.3);
  transition: all 0.4s ease;
}

.task-box:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 30px rgba(0,255,223,0.5);
}

/* TEXTAREAS & SELECTS */
textarea, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #0affd7;
  background: rgba(0,0,0,0.3);
  color: #fff;
  resize: none;
  font-size: 14px;
  transition: all 0.3s ease;
}

textarea:focus, select:focus {
  outline: none;
  box-shadow: 0 0 10px #0affd7;
  border-color: #00d4ff;
}

/* BUTTONS */
button {
  padding: 12px 20px;
  background: linear-gradient(90deg, #0affd7, #00d4ff);
  color: #000;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 0 15px #0affd7;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #0affd7, 0 0 20px #00d4ff inset;
}

/* SCROLLBAR */
.main::-webkit-scrollbar {
  width: 12px;
}

.main::-webkit-scrollbar-track {
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
}

.main::-webkit-scrollbar-thumb {
  background: #0affd7;
  border-radius: 6px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="topbar">

<button onclick="connectWallet()">
Enter With MetaMask
</button>

<span id="wallet"></span>

</div>

<div class="container">

<div class="sidebar">

<h3>Worker Panel</h3>

<h3>Your Balance</h3>

<p id="balance">
TRB Balance: 0
</p>

<p>
Tasks Completed:
<span id="taskCount">0</span>
</p>

</div>

<div class="main" id="dashboard" style="display:none;">

<h2>AI Training Micro Work</h2>

<div class="task-box">

<label>Ask AI a Question:</label>

<textarea id="questionInput"
placeholder="Type a question for AI...">
</textarea>

<button onclick="generateAI()">
Generate AI Answer
</button>

<br><br>

<label>AI Answer:</label>

<textarea id="aiAnswer"
placeholder="AI answer will appear here">
</textarea>

<label>Rate AI Answer (1–5)</label>

<select id="rating">

<option value="">Select Rating</option>
<option value="1">1 - Poor</option>
<option value="2">2 - Fair</option>
<option value="3">3 - Good</option>
<option value="4">4 - Very Good</option>
<option value="5">5 - Perfect</option>

</select>

<label>Correct AI Answer:</label>

<textarea id="correctedAnswer"
placeholder="Fix the AI answer if needed">
</textarea>

<button onclick="submitWork()">
Submit Work
</button>

</div>

</div>

</div>

<script>
/* GLOBAL STATE */
let balance = 0;
let tasksCompleted = 0;
let provider;
let signer;

/* CONNECT WALLET */
async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("MetaMask not detected.");
      return;
    }

    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();

    const address = await signer.getAddress();
    document.getElementById("wallet").innerText =
      "Connected: " + address.slice(0, 6) + "..." + address.slice(-4);

    document.getElementById("dashboard").style.display = "block";
    console.log("Wallet connected:", address);
  } catch (err) {
    console.error(err);
    alert("Wallet connection failed.");
  }
}

/* FAKE AI GENERATOR */
function generateAI() {
  let question = document.getElementById("questionInput").value.trim();
  if (question.length < 3) {
    alert("Enter a question first");
    return;
  }

  const responses = [
    "Based on the input, this appears logically correct.",
    "The correct result depends on additional variables.",
    "This solution may vary depending on context.",
    "The output was generated using learned patterns.",
    "The result is estimated from previous examples."
  ];

  const aiResponse = responses[Math.floor(Math.random() * responses.length)];
  document.getElementById("aiAnswer").value = aiResponse;
}

/* SUBMIT WORK WITH REAL TRANSACTION */
async function submitWork() {
  if (!signer) {
    alert("Connect wallet first.");
    return;
  }

  let question = document.getElementById("questionInput").value.trim();
  let aiAnswer = document.getElementById("aiAnswer").value.trim();
  let rating = document.getElementById("rating").value;
  let corrected = document.getElementById("correctedAnswer").value.trim();

  if (!question || !aiAnswer || !rating || !corrected) {
    alert("Complete all fields");
    return;
  }

  // --- REWARD & UI ---
  let reward = parseInt(rating);
  balance += reward;
  tasksCompleted++;
  document.getElementById("balance").innerText = "TRB Balance: " + balance.toFixed(2);
  document.getElementById("taskCount").innerText = tasksCompleted;

  // --- CREATE TRANSACTION ---
  const taskData = JSON.stringify({ question, aiAnswer, rating, corrected, time: Date.now() });

  const tx = {
    to: await signer.getAddress(),              // Send to self
    value: ethers.utils.parseEther("0.000001"),// Tiny Polygon value
    data: ethers.utils.toUtf8Bytes(taskData)   // Embed task JSON
  };

  try {
    const sentTx = await signer.sendTransaction(tx);
    await sentTx.wait(); // Wait for confirmation
    alert("Work Submitted & Logged On Blockchain!\nTx Hash: " + sentTx.hash);
  } catch (err) {
    console.error(err);
    alert("Transaction failed or rejected");
  }

  // --- RESET TASK ---
  document.getElementById("questionInput").value = "";
  document.getElementById("aiAnswer").value = "";
  document.getElementById("rating").value = "";
  document.getElementById("correctedAnswer").value = "";
}
</script>

</body>
</html>
