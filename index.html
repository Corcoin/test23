<!DOCTYPE html>
<html>
<head>
<title>TeachAI Worker Portal</title>

<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>

body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

/* TOP BAR */

.topbar {
  background: #1a1a1a;
  padding: 15px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
}

.topbar button {
  padding: 10px 15px;
  background: #4CAF50;
  border: none;
  color: white;
  cursor: pointer;
}

#wallet {
  margin-left: 20px;
}

/* LAYOUT */

.container {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */

.sidebar {
  width: 240px;
  background: #181818;
  padding: 20px;
  border-right: 1px solid #333;
}

/* MAIN */

.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* TASK BOX */

.task-box {
  background: #222;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 80px;
  margin-top: 10px;
  padding: 10px;
}

select {
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  background: #4CAF50;
  border: none;
  color: white;
}

</style>

</head>

<body>

<div class="topbar">

<button onclick="connectWallet()">
Enter With MetaMask
</button>

<span id="wallet"></span>

</div>

<div class="container">

<div class="sidebar">

<h3>Worker Panel</h3>

<h3>Your Balance</h3>

<p id="balance">
TRB Balance: 0
</p>

<p>
Tasks Completed:
<span id="taskCount">0</span>
</p>

</div>

<div class="main" id="dashboard" style="display:none;">

<h2>AI Training Micro Work</h2>

<div class="task-box">

<label>Ask AI a Question:</label>

<textarea id="questionInput"
placeholder="Type a question for AI...">
</textarea>

<button onclick="generateAI()">
Generate AI Answer
</button>

<br><br>

<label>AI Answer:</label>

<textarea id="aiAnswer"
placeholder="AI answer will appear here">
</textarea>

<label>Rate AI Answer (1–5)</label>

<select id="rating">

<option value="">Select Rating</option>
<option value="1">1 - Poor</option>
<option value="2">2 - Fair</option>
<option value="3">3 - Good</option>
<option value="4">4 - Very Good</option>
<option value="5">5 - Perfect</option>

</select>

<label>Correct AI Answer:</label>

<textarea id="correctedAnswer"
placeholder="Fix the AI answer if needed">
</textarea>

<button onclick="submitWork()">
Submit Work
</button>

</div>

</div>

</div>

<script>

/* STATE */

let balance = 0;
let tasksCompleted = 0;
let signer;

/* CONNECT WALLET */

async function connectWallet() {

if (typeof window.ethereum !== 'undefined') {

const provider =
new ethers.providers.Web3Provider(window.ethereum);

await provider.send(
"eth_requestAccounts",
[]
);

signer = provider.getSigner();

let address =
await signer.getAddress();

document.getElementById("wallet")
.innerText =
"Connected: " + address;

document.getElementById("dashboard")
.style.display = "block";

} else {

alert("MetaMask not detected.");

}

}

/* FAKE AI GENERATOR */

function generateAI() {

let question =
document.getElementById("questionInput").value;

if (question.length < 3) {

alert("Enter a question");

return;

}

/* Fake AI logic */

let responses = [

"This appears to be correct based on logic.",
"The answer depends on additional context.",
"A possible solution is calculated mathematically.",
"This result may vary depending on input.",
"The response is generated based on pattern learning."

];

let aiResponse =
responses[
Math.floor(
Math.random() * responses.length
)
];

document.getElementById("aiAnswer")
.value = aiResponse;

}

/* SUBMIT WORK */

async function submitWork() {

let question =
document.getElementById("questionInput").value;

let aiAnswer =
document.getElementById("aiAnswer").value;

let rating =
document.getElementById("rating").value;

let corrected =
document.getElementById("correctedAnswer").value;

if (
question == "" ||
aiAnswer == "" ||
rating == "" ||
corrected == ""
) {

alert("Complete all fields");

return;

}

/* Earn Reward */

let reward = parseInt(rating);

balance += reward;

tasksCompleted++;

document.getElementById("balance")
.innerText =
"TRB Balance: " +
balance.toFixed(2);

document.getElementById("taskCount")
.innerText =
tasksCompleted;

/* Save Proof On Blockchain */

let message =
JSON.stringify({
question: question,
aiAnswer: aiAnswer,
rating: rating,
corrected: corrected,
time: Date.now()
});

try {

await signer.signMessage(message);

alert(
"Work Submitted & Logged On Blockchain"
);

} catch (err) {

alert("Signature cancelled");

}

/* RESET TASK */

document.getElementById("questionInput").value = "";
document.getElementById("aiAnswer").value = "";
document.getElementById("rating").value = "";
document.getElementById("correctedAnswer").value = "";

}

</script>

</body>
</html>
